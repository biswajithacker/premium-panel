<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UI Injector - Premium Panel</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* --- Premium Neon Dark Theme CSS --- */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; user-select: none; }
        body { background: #070a13; color: #fff; overflow: hidden; height: 100vh; width: 100vw; }
        
        /* Centered Login Container */
        .login-wrap { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; background: radial-gradient(circle, #111827 0%, #070a13 100%); z-index: 10; }
        .login-box { width: 340px; padding: 30px; background: #0f172a; border-radius: 16px; border: 1px solid #38bdf8; box-shadow: 0 0 25px rgba(56, 189, 248, 0.2); text-align: center; }
        .login-box h2 { font-size: 26px; margin-bottom: 20px; color: #38bdf8; text-transform: uppercase; letter-spacing: 2px; }
        .input-group { position: relative; margin-bottom: 15px; }
        .input-group i { position: absolute; left: 12px; top: 14px; color: #64748b; }
        .input-group input { width: 100%; padding: 12px 12px 12px 40px; background: #1e293b; border: 1px solid #334155; border-radius: 8px; color: #fff; outline: none; transition: 0.3s; }
        .input-group input:focus { border-color: #38bdf8; box-shadow: 0 0 10px rgba(56, 189, 248, 0.3); }
        
        button { width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; text-transform: uppercase; }
        .btn-login { background: linear-gradient(135deg, #38bdf8, #2563eb); color: #fff; box-shadow: 0 4px 15px rgba(37, 99, 235, 0.4); }
        .btn-login:hover { transform: translateY(-2px); }
        .btn-action { background: #1e293b; color: #94a3b8; border: 1px solid #334155; font-size: 12px; }
        .btn-action:hover { color: #fff; border-color: #38bdf8; }
        .btn-gen { background: linear-gradient(135deg, #ec4899, #f43f5e); color: #fff; margin-top: 20px; box-shadow: 0 4px 15px rgba(244, 63, 94, 0.4); }
        
        /* Shortener/Key System Pages */
        .key-page { display: none; text-align: center; }
        .timer-text { font-size: 40px; font-weight: bold; color: #f43f5e; margin: 20px 0; }
        .key-display { background: #1e293b; padding: 15px; border-radius: 8px; border: 1px dashed #38bdf8; margin: 15px 0; font-family: monospace; font-size: 16px; color: #38bdf8; word-break: break-all; }

        /* --- Floating Menu Style --- */
        .floating-menu { position: absolute; top: 100px; left: 50px; width: 280px; background: rgba(15, 23, 42, 0.95); border: 2px solid #38bdf8; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); display: none; z-index: 999; backdrop-filter: blur(5px); }
        .menu-header { background: #1e293b; padding: 12px; border-top-left-radius: 10px; border-top-right-radius: 10px; cursor: move; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #334155; }
        .menu-title { font-weight: bold; color: #38bdf8; font-size: 14px; letter-spacing: 1px; }
        .menu-btns i { cursor: pointer; margin-left: 10px; font-size: 16px; transition: 0.2s; }
        .menu-btns i:hover { color: #f43f5e; }
        .menu-content { padding: 15px; max-height: 350px; overflow-y: auto; }
        
        /* Toggle Switches & Ranges */
        .menu-item { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
        .menu-item span { font-size: 13px; color: #cbd5e1; }
        .switch { position: relative; display: inline-block; width: 40px; height: 22px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #334155; transition: .3s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 3px; bottom: 3px; background-color: white; transition: .3s; border-radius: 50%; }
        input:checked + .slider { background-color: #38bdf8; }
        input:checked + .slider:before { transform: translateX(18px); }
        
        .range-box { margin-bottom: 14px; }
        .range-box label { display: flex; justify-content: space-between; font-size: 12px; color: #94a3b8; margin-bottom: 5px; }
        .range-box input { width: 100%; accent-color: #38bdf8; cursor: pointer; }

        /* Floating Logo Icon */
        .floating-logo { position: absolute; top: 150px; left: 150px; width: 50px; height: 50px; background: linear-gradient(135deg, #38bdf8, #2563eb); border-radius: 50%; display: none; justify-content: center; align-items: center; font-weight: bold; font-size: 20px; color: #fff; cursor: move; box-shadow: 0 0 15px #38bdf8; z-index: 1000; }

        /* Aim FOV Overlay Circle */
        #fov-circle { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); border: 2px solid #22c55e; border-radius: 50%; pointer-events: none; display: none; z-index: 998; box-shadow: 0 0 8px rgba(34, 197, 94, 0.4); }
    </style>
</head>
<body>

    <!-- 1. LOGIN & KEY GENERATOR SYSTEM -->
    <div class="login-wrap" id="auth-screen">
        <!-- Main Login Box -->
        <div class="login-box" id="box-login">
            <h2>UI Injector</h2>
            <div class="input-group">
                <i class="fa-solid fa-user"></i>
                <input type="text" id="username" placeholder="Username">
            </div>
            <div class="input-group">
                <i class="fa-solid fa-lock"></i>
                <input type="password" id="password" placeholder="Password">
            </div>
            <button class="btn-login" onclick="attemptLogin()">Login</button>
            <button class="btn-action" style="margin-top:15px;" onclick="saveCredentials()">Save User/Pass</button>
            <button class="btn-gen" onclick="startKeySystem()">Generate User/Pass</button>
        </div>

        <!-- Time Lock Pages (4 Pages loop + 5th Page Verification) -->
        <div class="login-box key-page" id="box-timer">
            <h2 id="page-title">Link Page 1/4</h2>
            <p style="color:#94a3b8; font-size:14px;">Please wait until the timer finishes to unlock the next step.</p>
            <div class="timer-text" id="countdown">10</div>
            <button class="btn-login" id="btn-next" disabled onclick="nextStep()">Please Wait...</button>
        </div>

        <!-- 5th Page: Final Key Output -->
        <div class="login-box key-page" id="box-final">
            <h2>Access Granted!</h2>
            <p style="color:#94a3b8; font-size:13px;">Copy these details. Expire in 24 Hours.</p>
            <div class="key-display" id="generated-creds">Generating...</div>
            <button class="btn-login" onclick="backToLogin()">Go to Login</button>
        </div>
    </div>

    <!-- 2. FLOATING MENU SYSTEM -->
    <div class="floating-menu" id="mod-menu">
        <div class="menu-header" id="menu-drag">
            <div class="menu-title">UI INJECTOR MENU</div>
            <div class="menu-btns">
                <i class="fa-solid fa-minus" onclick="minimizeMenu()" title="Minimize"></i>
                <i class="fa-solid fa-trash" onclick="removeMenu()" title="Remove Menu"></i>
            </div>
        </div>
        <div class="menu-content">
            <!-- Functions Grid -->
            <div class="menu-item">
                <span>Marco Sensi</span>
                <label class="switch"><input type="checkbox"><span class="slider"></span></label>
            </div>
            <div class="menu-item">
                <span>Drag Sensi</span>
                <label class="switch"><input type="checkbox"><span class="slider"></span></label>
            </div>
            <div class="menu-item">
                <span>Head 50%</span>
                <label class="switch"><input type="checkbox"><span class="slider"></span></label>
            </div>

            <!-- Aim Fov Function with Range Seekbar -->
            <div class="menu-item">
                <span>Aim Fov360%</span>
                <label class="switch"><input type="checkbox" id="fov-toggle" onchange="toggleFov()"><span class="slider"></span></label>
            </div>
            <div class="range-box">
                <label><span>Fov Size</span><span id="fov-val">100px</span></label>
                <input type="range" id="fov-size" min="30" max="300" value="100" oninput="updateFovSize()">
            </div>

            <div class="menu-item">
                <span>Aim Sensi</span>
                <label class="switch"><input type="checkbox"><span class="slider"></span></label>
            </div>
            <div class="menu-item">
                <span>Aimlock 50%</span>
                <label class="switch"><input type="checkbox"><span class="slider"></span></label>
            </div>
        </div>
    </div>

    <!-- 3. MINI FLOATING LOGO (U) -->
    <div class="floating-logo" id="mod-logo" onclick="maximizeMenu()">U</div>

    <!-- 4. GREEN FOV CIRCLE -->
    <div id="fov-circle"></div>

    <!-- --- CORE JAVASCRIPT LOGIC --- -->
    <script>
        let currentStep = 1;
        let countdownTimer;

        // Auto Load Saved User/Pass
        window.onload = function() {
            if(localStorage.getItem("saved_user")) {
                document.getElementById("username").value = localStorage.getItem("saved_user");
                document.getElementById("password").value = localStorage.getItem("saved_pass");
            }
        }

        function saveCredentials() {
            let u = document.getElementById("username").value;
            let p = document.getElementById("password").value;
            if(u && p){
                localStorage.setItem("saved_user", u);
                localStorage.setItem("saved_pass", p);
                alert("Credentials Saved Locally!");
            } else {
                alert("Please fill Username and Password first!");
            }
        }

        // --- Key Generation System (Time-Lock 4 Pages) ---
        function startKeySystem() {
            currentStep = 1;
            document.getElementById("box-login").style.display = "none";
            document.getElementById("box-timer").style.display = "block";
            runTimer();
        }

        function runTimer() {
            let timeLeft = 10; // 10 Seconds Lock per page
            document.getElementById("page-title").innerText = `Link Page ${currentStep}/4`;
            let btn = document.getElementById("btn-next");
            btn.disabled = true;
            btn.innerText = "Please Wait...";
            document.getElementById("countdown").innerText = timeLeft;

            clearInterval(countdownTimer);
            countdownTimer = setInterval(() => {
                timeLeft--;
                document.getElementById("countdown").innerText = timeLeft;
                if(timeLeft <= 0) {
                    clearInterval(countdownTimer);
                    btn.disabled = false;
                    btn.innerText = currentStep === 4 ? "Generate Final Key" : "Next Page ->";
                }
            }, 1000);
        }

        function nextStep() {
            if(currentStep < 4) {
                currentStep++;
                runTimer();
            } else {
                // 5th Page: Generate Credentials and set 24h Expire
                document.getElementById("box-timer").style.display = "none";
                document.getElementById("box-final").style.display = "block";
                
                let genUser = "UI_" + Math.floor(1000 + Math.random() * 9000);
                let genPass = "PASS_" + Math.floor(10000 + Math.random() * 90000);
                let expiryTime = Date.now() + (24 * 60 * 60 * 1000); // 24 Hours in millisecond

                // Save to localStorage for validation
                localStorage.setItem("valid_user", genUser);
                localStorage.setItem("valid_pass", genPass);
                localStorage.setItem("token_expiry", expiryTime);

                document.getElementById("generated-creds").innerHTML = `<strong>User:</strong> ${genUser}<br><strong>Pass:</strong> ${genPass}`;
            }
        }

        function backToLogin() {
            document.getElementById("box-final").style.display = "none";
            document.getElementById("box-login").style.display = "block";
        }

        // --- Login Authentication ---
        function attemptLogin() {
            let userIn = document.getElementById("username").value;
            let passIn = document.getElementById("password").value;

            let validUser = localStorage.getItem("valid_user");
            let validPass = localStorage.getItem("valid_pass");
            let expiry = localStorage.getItem("token_expiry");

            // Check if key is expired
            if(expiry && Date.now() > parseInt(expiry)) {
                alert("Your Username/Password has expired (24 Hours over)! Please generate a new one.");
                localStorage.removeItem("valid_user");
                localStorage.removeItem("valid_pass");
                localStorage.removeItem("token_expiry");
                return;
            }

            // Hardcoded master bypass or Generated check
            if((userIn === validUser && passIn === validPass) || (userIn === "admin" && passIn === "1234")) {
                document.getElementById("auth-screen").style.display = "none";
                document.getElementById("mod-menu").style.display = "block";
            } else {
                alert("Invalid or Expired Username/Password!");
            }
        }

        // --- Aim FOV Green Circle Controls ---
        function toggleFov() {
            let fovToggle = document.getElementById("fov-toggle").checked;
            let circle = document.getElementById("fov-circle");
            circle.style.display = fovToggle ? "block" : "none";
            updateFovSize();
        }

        function updateFovSize() {
            let size = document.getElementById("fov-size").value;
            let circle = document.getElementById("fov-circle");
            circle.style.width = size + "px";
            circle.style.height = size + "px";
            document.getElementById("fov-val").innerText = size + "px";
        }

        // --- Minimize/Maximize & Remove Controls ---
        function minimizeMenu() {
            document.getElementById("mod-menu").style.display = "none";
            document.getElementById("mod-logo").style.display = "flex";
        }

        function maximizeMenu() {
            document.getElementById("mod-logo").style.display = "none";
            document.getElementById("mod-menu").style.display = "block";
        }

        function removeMenu() {
            if(confirm("Do you want to completely remove the Floating Menu?")) {
                document.getElementById("mod-menu").remove();
                document.getElementById("mod-logo").remove();
                document.getElementById("fov-circle").remove();
                window.location.reload(); // App resetting
            }
        }

        // --- Dragging Engine for Menu and Floating Logo ---
        makeDraggable(document.getElementById("mod-menu"), document.getElementById("menu-drag"));
        makeDraggable(document.getElementById("mod-logo"), document.getElementById("mod-logo"));

        function makeDraggable(element, dragArea) {
            let pos1 = 0, pos2 = 0, pos3 = 0, pos4 = 0;
            dragArea.onmousedown = dragMouseDown;
            dragArea.ontouchstart = dragMouseDown; // For mobile support

            function dragMouseDown(e) {
                e = e || window.event;
                if(e.type !== 'touchstart') e.preventDefault();
                pos3 = e.clientX || e.touches[0].clientX;
                pos4 = e.clientY || e.touches[0].clientY;
                document.onmouseup = closeDragElement;
                document.ontouchend = closeDragElement;
                document.onmousemove = elementDrag;
                document.ontouchmove = elementDrag;
            }

            function elementDrag(e) {
                e = e || window.event;
                let clientX = e.clientX || (e.touches ? e.touches[0].clientX : 0);
                let clientY = e.clientY || (e.touches ? e.touches[0].clientY : 0);
                
                pos1 = pos3 - clientX;
                pos2 = pos4 - clientY;
                pos3 = clientX;
                pos4 = clientY;
                
                element.style.top = (element.offsetTop - pos2) + "px";
                element.style.left = (element.offsetLeft - pos1) + "px";
            }

            function closeDragElement() {
                document.onmouseup = null;
                document.ontouchend = null;
                document.onmousemove = null;
                document.ontouchmove = null;
            }
        }
    </script>
</body>
  </html>
